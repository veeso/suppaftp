name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  toolchain:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.extract.outputs.result }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Extract toolchain channel from rust-toolchain.toml
        id: extract
        uses: mikefarah/yq@1b9b4ac5187171d2e5e3129be0cfa827c7f9d53d # v4.53.3
        with:
          cmd: yq '.toolchain.channel' rust-toolchain.toml

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly
          components: rustfmt
      - name: Check formatting (dprint)
        uses: dprint/check@9cb3a2b17a8e606d37aae341e49df3654933fc23 # v2.3

  clippy:
    needs: toolchain
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          [
            native-tls,
            rustls-aws-lc-rs,
            rustls-ring,
            async-std,
            tokio,
            async-std-async-native-tls,
            tokio-async-native-tls,
            async-std-rustls-aws-lc-rs,
            async-std-rustls-ring,
            tokio-rustls-aws-lc-rs,
            tokio-rustls-ring,
          ]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ needs.toolchain.outputs.channel }}
          components: clippy
      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Clippy
        env:
          FEATURES: ${{ matrix.features }}
        run: just clippy "$FEATURES" "-- -D warnings"

  clippy-cli:
    needs: toolchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-cli-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ needs.toolchain.outputs.channel }}
          components: clippy
      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Build CLI
        run: just build_cli
      - name: Clippy CLI
        run: just clippy_cli

  test:
    needs: toolchain
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          [
            native-tls,
            rustls-aws-lc-rs,
            rustls-ring,
            async-std,
            tokio,
            async-std-async-native-tls,
            tokio-async-native-tls,
            async-std-rustls-aws-lc-rs,
            async-std-rustls-ring,
            tokio-rustls-aws-lc-rs,
            tokio-rustls-ring,
          ]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ needs.toolchain.outputs.channel }}
      - uses: taiki-e/install-action@8b3c737da4b541bf0fb5a3e0488ff20535badac9 # v2.82.1
        with:
          tool: cargo-llvm-cov
      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Run tests with coverage
        env:
          FEATURES: ${{ matrix.features }}
        run: just coverage "$FEATURES"
      - name: Upload to Coveralls
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel: true
          file: lcov-${{ matrix.features }}.info

  wait-for-coverage:
    name: Wait for coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Wait for coveralls
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true

  build:
    needs: toolchain
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          [
            native-tls,
            rustls-aws-lc-rs,
            rustls-ring,
            async-std,
            tokio,
            async-std-async-native-tls,
            tokio-async-native-tls,
            async-std-rustls-aws-lc-rs,
            async-std-rustls-ring,
            tokio-rustls-aws-lc-rs,
            tokio-rustls-ring,
          ]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ needs.toolchain.outputs.channel }}
      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Build
        env:
          FEATURES: ${{ matrix.features }}
        run: just build "$FEATURES"

  doc:
    needs: toolchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ needs.toolchain.outputs.channel }}
      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Build docs
        run: just doc

  deny:
    needs: toolchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ needs.toolchain.outputs.channel }}
      - name: Install cargo-deny
        uses: taiki-e/install-action@8b3c737da4b541bf0fb5a3e0488ff20535badac9 # v2.82.1
        with:
          tool: cargo-deny
      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Check dependencies
        run: just deny
