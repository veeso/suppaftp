[[bin]]
name = "suppaftp"
path = "src/main.rs"

[dependencies]
argh = { workspace = true }
env_logger = { workspace = true }
log = { workspace = true }
rpassword = { workspace = true }
suppaftp = { workspace = true, features = ["native-tls"] }
