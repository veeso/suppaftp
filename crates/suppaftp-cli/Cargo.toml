[package]
name = "suppaftp-cli"
version = { workspace = true }
authors = { workspace = true }
categories = { workspace = true }
edition = { workspace = true }
homepage = "https://github.com/veeso/suppaftp"
include = [
  "src/**/*",
  "../../LICENSE-MIT",
  "../../LICENSE-APACHE",
  "../../README.md",
  "../../CHANGELOG.md",
]
keywords = { workspace = true }
license = { workspace = true }
